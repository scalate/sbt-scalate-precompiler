name: CI
on:
  merge_group:
  push:
    branches:
      - master
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        java: [8, 17, 25]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: ${{matrix.java}}
        distribution: adopt
    - uses: sbt/setup-sbt@v1
    - run: sbt -v
           scalafmtSbtCheck
           scalafmtCheckAll
           test
           publishLocal
           scripted
      if: ${{ matrix.java != '8' }}
    - run: sbt -v
           "all plugin2_12/publishLocal precompiler2_12/publishLocal precompiler2_13/publishLocal precompiler3/publishLocal"
           plugin2_12/scripted
      if: ${{ matrix.java == '8' }}
    - run: rm -rf ~/.ivy2/local
